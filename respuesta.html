<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado del pago — NicValia Make up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Karla:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff1f5; --bg-deep:#ffe3ec; --ink:#54323e; --ink-soft:#9b7b86;
    --accent:#e0608a; --accent-ink:#c25477; --line:#f3d3dd;
    --ok:#1f9d6b; --warn:#d89b1f; --bad:#d2544f;
    --font-display:'Prata',serif; --font-body:'Karla',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    font-family:var(--font-body); color:var(--ink);
    background:linear-gradient(160deg,var(--bg) 0%,var(--bg-deep) 100%);
  }
  .card{
    width:100%; max-width:440px; background:#fff; border:1px solid var(--line);
    border-radius:26px; padding:40px 30px; text-align:center;
    box-shadow:0 18px 50px #c2547722;
  }
  .badge{
    width:78px; height:78px; margin:0 auto 18px; border-radius:50%;
    display:grid; place-items:center;
  }
  .badge svg{width:40px;height:40px;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .badge.ok{background:#e3f6ec;stroke:var(--ok)}
  .badge.warn{background:#fdf3dd;stroke:var(--warn)}
  .badge.bad{background:#fbe6e5;stroke:var(--bad)}
  .badge.load{background:var(--bg)}
  .spinner{
    width:42px;height:42px;border-radius:50%;
    border:4px solid var(--line);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-family:var(--font-display);font-weight:400;font-size:26px;margin:6px 0 8px;color:var(--accent-ink)}
  p{margin:6px 0;color:var(--ink-soft);line-height:1.5}
  .detail{
    margin:20px 0 4px; padding:14px 16px; background:var(--bg);
    border-radius:14px; text-align:left; font-size:14px;
  }
  .detail div{display:flex;justify-content:space-between;gap:12px;padding:4px 0}
  .detail b{color:var(--ink);font-weight:700}
  .home{
    display:inline-block; margin-top:22px; padding:13px 30px; border-radius:999px;
    background:var(--accent); color:#fff; font-weight:700; text-decoration:none;
    box-shadow:0 10px 24px #e0608a55;
  }
  .home:hover{background:var(--accent-ink)}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="badge load"><div class="spinner"></div></div>
    <h1>Verificando tu pago…</h1>
    <p>Dame un segundito mientras confirmo la transacción.</p>
  </div>

<script>
  var CART_KEY = "nv_cart_v1";
  var card = document.getElementById("card");

  var ICONS = {
    ok:   '<path d="M5 13l4 4L19 7"></path>',
    warn: '<path d="M12 8v5"></path><path d="M12 16.5v.5"></path><circle cx="12" cy="12" r="9"></circle>',
    bad:  '<path d="M8 8l8 8"></path><path d="M16 8l-8 8"></path><circle cx="12" cy="12" r="9"></circle>'
  };

  function money(n){
    n = Number(n) || 0;
    return "$" + n.toLocaleString("es-CO");
  }

  function render(type, titulo, msg, detalle){
    var rows = "";
    if (detalle){
      for (var k in detalle){
        if (detalle[k] === undefined || detalle[k] === null || detalle[k] === "") continue;
        rows += '<div><span>' + k + '</span><b>' + detalle[k] + '</b></div>';
      }
    }
    card.innerHTML =
      '<div class="badge ' + type + '"><svg viewBox="0 0 24 24" stroke="currentColor">' + (ICONS[type] || "") + '</svg></div>' +
      '<h1>' + titulo + '</h1>' +
      '<p>' + msg + '</p>' +
      (rows ? '<div class="detail">' + rows + '</div>' : '') +
      '<a class="home" href="/">Volver a la tienda</a>';
  }

  var params = new URLSearchParams(location.search);
  var ref = params.get("ref_payco");

  if (!ref){
    render("warn", "Sin información", "No encontramos la referencia del pago. Si ya pagaste, revisa tu correo: te llegará la confirmación.");
  } else {
    fetch("https://secure.epayco.co/validation/v1/reference/" + encodeURIComponent(ref))
      .then(function(r){ return r.json(); })
      .then(function(res){
        var d = (res && res.data) ? res.data : {};
        var estado = (d.x_transaction_state || d.x_response || "").toLowerCase();
        var detalle = {
          "Referencia": d.x_ref_payco || ref,
          "Pedido": d.x_id_invoice || "",
          "Valor": d.x_amount ? money(d.x_amount) : "",
          "Estado": d.x_transaction_state || d.x_response || ""
        };

        if (estado.indexOf("acept") !== -1 || estado.indexOf("aprob") !== -1){
          try { localStorage.removeItem(CART_KEY); } catch(e){}
          render("ok", "¡Pago confirmado! 🎀",
            "Gracias por tu compra en NicValia Make up. Te contactaremos para coordinar el envío.", detalle);
        } else if (estado.indexOf("pend") !== -1){
          render("warn", "Pago pendiente",
            "Tu pago quedó en proceso. Cuando se confirme te avisaremos por correo.", detalle);
        } else {
          render("bad", "El pago no se completó",
            "La transacción fue rechazada o cancelada. Puedes intentar de nuevo desde el carrito.", detalle);
        }
      })
      .catch(function(){
        render("warn", "Pago recibido",
          "No pudimos leer el estado automáticamente, pero tu transacción quedó registrada. Revisa tu correo para la confirmación.",
          { "Referencia": ref });
      });
  }
</script>
</body>
</html>
